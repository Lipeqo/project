services:
  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      DB_SERVER: db
      DB_USER: sa
      DB_PASSWORD: YourStrong!Pass123
      DB_NAME: master

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStrong!Pass123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql   # 👈 NAJWAŻNIEJSZE

# 👇 DEFINICJA VOLUME
volumes:
  sql_data: